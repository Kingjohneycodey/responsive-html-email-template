name: Basic CI Workflow

on:
  push:
    branches: [ "main", "master", "feature/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    name: Run Basic Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Email Templates
        run: |
          if [ -f "email.html" ]; then
            echo "✅ email.html found"
          else
            echo "❌ email.html missing"
            exit 1
          fi
          
          if [ -f "email-inlined.html" ]; then
            echo "✅ email-inlined.html found"
          else
            echo "❌ email-inlined.html missing"
            exit 1
          fi

      - name: Finish
        run: echo "Basic CI passed successfully! 🚀"
